name: CI-CD

on:
  workflow_dispatch:            
    inputs:
      environments:
        description: Environment values where this workflow runs
        default: dev
        required: true
        type: choice
        options:
          - dev
          - prod
          - staging
          
jobs:
  code: 
    runs-on: ubuntu-latest
    steps:
      - name: Chechkout code
        run: echo "Code cloned form GitHub."
  build:
    needs: [code]
    runs-on: ubuntu-latest
    steps:
      - name: Build docker container.
        run: echo "Docker container built."
  test:
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - name: Test the container
        run: echo "Testing the container."
  deploy:
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - name: Deploying the app
        run: echo "Docker compose deployed the app."
      
